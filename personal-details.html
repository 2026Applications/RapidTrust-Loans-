<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Details - RapidTrust Loans</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#ffffff;
    color:#0b1f3a;
}

header{
    position:sticky;
    top:0;
    width:100%;
    background:#ffffff;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    z-index:1000;
}

.logo{
    font-size:20px;
    font-weight:bold;
    color:#0b1f3a;
}

.form-container{
    max-width:500px;
    margin:30px auto;
    padding:20px;
}

.progress{
    text-align:center;
    color:#00cfd5;
    font-weight:bold;
    margin-bottom:20px;
}

.form-container h2{
    text-align:center;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

.next-btn{
    width:100%;
    padding:14px;
    background:#00cfd5;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin-bottom:10px;
}

.back-btn{
    width:100%;
    padding:14px;
    background:#ffffff;
    color:#00cfd5;
    border:2px solid #00cfd5;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

footer{
    padding:20px;
    text-align:center;
    font-size:14px;
    color:#666;
}
</style>
</head>
<body>

<header>
    <div class="logo">RapidTrust Loans</div>
</header>

<div class="form-container">

    <div class="progress">1 of 5</div>

    <h2>Personal Details</h2>

    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Surname">
    <input type="text" placeholder="ID Number">
    <input type="tel" placeholder="Phone Number">
    <input type="email" placeholder="Email Address">

    <button class="next-btn" onclick="window.location.href='income-details.html'">Next</button>

    <button class="back-btn" onclick="window.location.href='index.html'">Back</button>

</div>

<footer>
    RapidTrust Loans © 2026
</footer>

</body>
</html>
